---
# .pre-commit-config.yaml
# Config for pre-commit, for more information see https://pre-commit.com/
ci:
  # This section is specific to pre-commit.ci, telling it to create a pull request
  # to update the linter version tag every week.
  autoupdate_schedule: weekly
  # Whether to recursively check out submodules.
  submodules: true
  # If you have other Ansible collection dependencies (requirements.yml)
  # pre-commit.ci will not be able to install them because it runs in offline mode,
  # and you will need to tell it to skip the hook.
  # skip:
  #   - ansible-lint

repos:
  # Default Pre-Commit Repository
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-xml
      - id: check-yaml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-executables-have-shebangs

  # Spell Checker
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args: [--ignore-words-list=archiv]

  # Shellcheck and shell formatting
  - repo: https://github.com/jumanjihouse/pre-commit-hooks
    rev: 3.0.0
    hooks:
      - id: shellcheck
        args: [--check-sourced, --external-sources]
      - id: shfmt
        args: [--posix]

  # Markdown File Checker
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint

  # Python formatter
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
